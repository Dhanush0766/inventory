services:
  # -------------------------
  # BACKEND - EXPRESS API
  # -------------------------
  - type: web
    name: inventory-backend
    plan: free
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true

  # -------------------------
  # FRONTEND - REACT (VITE)
  # -------------------------
  - type: web
    name: inventory-frontend
    env: static
    rootDir: frontend
    # Here we dynamically construct VITE_API_URL at build time using the backend's host.
    buildCommand: VITE_API_URL="https://${BACKEND_HOST}/api" npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: BACKEND_HOST
        fromService:
          type: web
          name: inventory-backend
          property: host
